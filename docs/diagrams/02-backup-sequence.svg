                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a3412"/>
        </marker></defs><rect x="0" y="0" width="1280" height="1260" fill="#fbfbfd"/><text x="640.0" y="32" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" font-style="normal" text-anchor="middle" fill="#0f172a">Anatomy of a Backup Run — “dbs backup raindrop”</text><text x="640.0" y="53" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="normal" font-style="normal" text-anchor="middle" fill="#475569">CLI → BackupService → Engine → Connector → Storage, one checkpoint transaction at a time</text><rect x="4" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#64748b" stroke-width="1.8"/><text x="80" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#64748b">User / cron</text><rect x="174" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.8"/><text x="250" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#1d4ed8">CLI</text><text x="250" y="125" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#1d4ed8">(dbs.cli)</text><rect x="374" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#047857" stroke-width="1.8"/><text x="450" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#047857">BackupService</text><text x="450" y="125" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#047857">(core.service)</text><rect x="584" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#047857" stroke-width="1.8"/><text x="660" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#047857">Engine</text><text x="660" y="125" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#047857">(core.engine)</text><rect x="794" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#b91c1c" stroke-width="1.8"/><text x="870" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#b91c1c">Connector</text><text x="870" y="125" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#b91c1c">(e.g. raindrop)</text><rect x="1004" y="90" width="152" height="46" rx="8" ry="8" fill="#fff" stroke="#c2410c" stroke-width="1.8"/><text x="1080" y="109" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#c2410c">Storage</text><text x="1080" y="125" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#c2410c">(SqliteStorage)</text><line x1="80" y1="156" x2="250" y2="156" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow-64748b)"/><text x="165.0" y="148" font-family="Helvetica, Arial, sans-serif" font-size="10.6" font-weight="normal" font-style="normal" text-anchor="middle" fill="#64748b">dbs backup raindrop</text><line x1="250" y1="188" x2="450" y2="188" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><text x="350.0" y="180" font-family="Helvetica, Arial, sans-serif" font-size="10.2" font-weight="normal" font-style="normal" text-anchor="middle" fill="#1d4ed8">BackupService.from_config_file()</text><line x1="250" y1="220" x2="450" y2="220" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><text x="350.0" y="212" font-family="Helvetica, Arial, sans-serif" font-size="10.2" font-weight="normal" font-style="normal" text-anchor="middle" fill="#1d4ed8">backup_source(&quot;raindrop&quot;, on_progress=…)</text><line x1="450" y1="258" x2="1080" y2="258" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><text x="765.0" y="250" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">reap_interrupted_runs() · load_cursor() · get_run_count()</text><line x1="450" y1="290" x2="1080" y2="290" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><text x="765.0" y="282" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">begin_run() → acquire_lock(source_id, run_id)</text><rect x="290.0" y="332" width="320" height="32" rx="6" ry="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/><text x="450" y="352.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="700" font-style="normal" text-anchor="middle" fill="#334155">_choose_mode(): incremental | reconcile | full</text><line x1="450" y1="390" x2="660" y2="390" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><text x="555.0" y="382" font-family="Helvetica, Arial, sans-serif" font-size="10.6" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">engine.run_source(rc, RunContext)</text><line x1="660" y1="422" x2="870" y2="422" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-b91c1c)"/><text x="765.0" y="414" font-family="Helvetica, Arial, sans-serif" font-size="10.4" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">connector.open(ctx)</text><line x1="660" y1="498" x2="870" y2="498" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-b91c1c)"/><text x="765.0" y="490" font-family="Helvetica, Arial, sans-serif" font-size="10.3" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">for event in connector.fetch(ctx):</text><line x1="870" y1="530" x2="660" y2="530" stroke="#b91c1c" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow-b91c1c)"/><text x="765.0" y="522" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">yield BackupItem  (×N, buffered)</text><line x1="870" y1="562" x2="660" y2="562" stroke="#b91c1c" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow-b91c1c)"/><text x="765.0" y="554" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">yield Checkpoint(cursor)</text><rect x="634" y="602" width="472" height="100" rx="8" ry="8" fill="#fff7ed" stroke="#c2410c" stroke-width="1.2" stroke-dasharray="2,2"/><text x="646" y="618" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="700" font-style="normal" text-anchor="start" fill="#9a3412">storage.transaction() — one commit per checkpoint</text><line x1="660" y1="632" x2="1080" y2="632" stroke="#9a3412" stroke-width="1.6" marker-end="url(#arrow-9a3412)"/><text x="870.0" y="624" font-family="Helvetica, Arial, sans-serif" font-size="9.3" font-weight="normal" font-style="normal" text-anchor="middle" fill="#9a3412">upsert_items(buffer) → classify created / updated / unchanged</text><line x1="660" y1="664" x2="1080" y2="664" stroke="#9a3412" stroke-width="1.6" marker-end="url(#arrow-9a3412)"/><text x="870.0" y="656" font-family="Helvetica, Arial, sans-serif" font-size="9.3" font-weight="normal" font-style="normal" text-anchor="middle" fill="#9a3412">save_cursor(source_id, cursor, watermark)</text><text x="640" y="724" font-family="Helvetica, Arial, sans-serif" font-size="9.3" font-weight="normal" font-style="normal" text-anchor="start" fill="#64748b">(repeats once per upstream page — bounded buffer, batch_max = 500)</text><rect x="610" y="458" width="310" height="288" rx="6" ry="6" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,3"/><text x="618" y="478" font-family="Helvetica, Arial, sans-serif" font-size="10.2" font-weight="700" font-style="normal" text-anchor="start" fill="#475569">loop  [per page / checkpoint]</text><line x1="660" y1="770" x2="870" y2="770" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-b91c1c)"/><text x="765.0" y="762" font-family="Helvetica, Arial, sans-serif" font-size="10.2" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">connector.close()   (always, in finally)</text><line x1="660" y1="846" x2="1080" y2="846" stroke="#9a3412" stroke-width="1.6" marker-end="url(#arrow-9a3412)"/><text x="870.0" y="838" font-family="Helvetica, Arial, sans-serif" font-size="9.6" font-weight="normal" font-style="normal" text-anchor="middle" fill="#9a3412">soft_delete_missing(live_ids) — within sweep_safety_fraction</text><rect x="610" y="806" width="520" height="76" rx="6" ry="6" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,3"/><text x="618" y="826" font-family="Helvetica, Arial, sans-serif" font-size="9.6" font-weight="700" font-style="normal" text-anchor="start" fill="#475569">opt  [mode ∈ {full, reconcile} ∧ supports_full_enumeration ∧ ReconcileMarker seen]</text><line x1="660" y1="906" x2="1080" y2="906" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><text x="870.0" y="898" font-family="Helvetica, Arial, sans-serif" font-size="10.4" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">finish_run(status, stats, cursor_after, error)</text><line x1="660" y1="938" x2="450" y2="938" stroke="#047857" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow-047857)"/><text x="555.0" y="930" font-family="Helvetica, Arial, sans-serif" font-size="10.6" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">return RunResult</text><line x1="450" y1="970" x2="1080" y2="970" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><text x="765.0" y="962" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" font-style="normal" text-anchor="middle" fill="#047857">release_lock()  ·  increment_run_count()</text><line x1="450" y1="1002" x2="250" y2="1002" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow-1d4ed8)"/><text x="350.0" y="994" font-family="Helvetica, Arial, sans-serif" font-size="10.6" font-weight="normal" font-style="normal" text-anchor="middle" fill="#1d4ed8">return RunResult</text><line x1="250" y1="1034" x2="80" y2="1034" stroke="#64748b" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow-64748b)"/><text x="165.0" y="1026" font-family="Helvetica, Arial, sans-serif" font-size="10.3" font-weight="normal" font-style="normal" text-anchor="middle" fill="#64748b">print status; exit(0 | 2 | 3 | 4 | 5)</text><line x1="80" y1="136" x2="80" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="250" y1="136" x2="250" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="450" y1="136" x2="450" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="660" y1="136" x2="660" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="870" y1="136" x2="870" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><line x1="1080" y1="136" x2="1080" y2="1072" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="3,3"/><rect x="48" y="1100" width="1184" height="130" rx="10" ry="10" fill="#eef2ff" stroke="#1d4ed8" stroke-width="1.2"/><text x="70" y="1126" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" font-style="normal" text-anchor="start" fill="#3730a3">Live progress (optional, best-effort)</text><text x="70" y="1148" font-family="Helvetica, Arial, sans-serif" font-size="10.6" font-weight="normal" text-anchor="start" fill="#312e81"><tspan x="70" dy="0">The engine emits a ProgressEvent at each lifecycle point — source_start, item (running fetched counter), checkpoint</tspan><tspan x="70" dy="17">(stats advance here), sweep, and source_done (carries the final RunResult). A callback exception is logged and</tspan><tspan x="70" dy="17">swallowed — a broken renderer can never abort a backup. The CLI draws a throttled status line to stderr (TTY-only,</tspan><tspan x="70" dy="17">overridable with --progress/--no-progress); the web tier relays the same events to the browser over Server-Sent Events.</tspan></text></svg>