          <path d="M 0 0 L 10 5 L 0 10 z" fill="#92400e"/>
        </marker></defs><rect x="0" y="0" width="1280" height="908" fill="#fbfbfd"/><text x="640.0" y="30" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" font-style="normal" text-anchor="middle" fill="#0f172a">Connector Plugin Discovery &amp; Collision Resolution</text><text x="640.0" y="50" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="normal" font-style="normal" text-anchor="middle" fill="#475569">src/dbs/core/registry.py — built-in and third-party connectors load through the same entry-point group</text><rect x="80" y="80" width="280" height="76" rx="10" ry="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/><text x="92" y="104" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">pyproject.toml — this package</text><line x1="92" y1="111" x2="348" y2="111" stroke="#cbd5e1" stroke-width="1"/><text x="92" y="128" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="92" dy="0">[project.entry-points.&quot;dbs.connectors&quot;]</tspan><tspan x="92" dy="15.5">raindrop / reddit / youtube / skool</tspan></text><rect x="480" y="80" width="280" height="76" rx="10" ry="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/><text x="492" y="104" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">third-party package(s)</text><line x1="492" y1="111" x2="748" y2="111" stroke="#cbd5e1" stroke-width="1"/><text x="492" y="128" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="492" dy="0">same entry-point group, declared in</tspan><tspan x="492" dy="15.5">their own pyproject.toml</tspan></text><rect x="40.0" y="206" width="760" height="64" rx="10" ry="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/><text x="52.0" y="231" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">ConnectorRegistry.discover()</text><line x1="52.0" y1="238" x2="788.0" y2="238" stroke="#cbd5e1" stroke-width="1"/><text x="52.0" y="255" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="52.0" dy="0">importlib.metadata.entry_points(group=&quot;dbs.connectors&quot;)  — one code path for built-in + third-party</tspan></text><line x1="220.0" y1="156" x2="268.0" y2="206" stroke="#047857" stroke-width="1.6" marker-end="url(#arrow-047857)"/><line x1="620.0" y1="156" x2="572.0" y2="206" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow-7c3aed)"/><rect x="70.0" y="326" width="460" height="150" rx="10" ry="10" fill="#fff" stroke="#334155" stroke-width="1.5"/><text x="82.0" y="350" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">per entry point, in isolation:</text><line x1="82.0" y1="357" x2="518.0" y2="357" stroke="#cbd5e1" stroke-width="1"/><text x="82.0" y="374" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="82.0" dy="0">1. ep.load()  — import the connector class</tspan><tspan x="82.0" dy="15.5">2. _validate_contract(cls)</tspan><tspan x="82.0" dy="15.5">    type matches [a-z][a-z0-9_]*, Capabilities,</tspan><tspan x="82.0" dy="15.5">    config_model, ≥1 ItemKind, secret_keys if</tspan><tspan x="82.0" dy="15.5">    requires_auth, Capabilities.assert_coherent()</tspan><tspan x="82.0" dy="15.5">3. core_api_version compatibility check</tspan></text><line x1="306.0" y1="270" x2="300.0" y2="326" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><rect x="590.0" y="326" width="220" height="150" rx="10" ry="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/><text x="602.0" y="349.5" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">any exception →</text><line x1="602.0" y1="356.5" x2="798.0" y2="356.5" stroke="#cbd5e1" stroke-width="1"/><text x="602.0" y="373.5" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="602.0" dy="0">LoadFailure(entry_point,</tspan><tspan x="602.0" dy="15.5">dist_name, reason)</tspan><tspan x="602.0" dy="15.5"></tspan><tspan x="602.0" dy="15.5">recorded, never raised —</tspan><tspan x="602.0" dy="15.5">isolation boundary.</tspan></text><line x1="530.0" y1="356" x2="590.0" y2="356" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-b91c1c)"/><text x="560.0" y="348" font-family="Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" font-style="normal" text-anchor="middle" fill="#b91c1c">invalid</text><rect x="70.0" y="522" width="460" height="56" rx="10" ry="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/><text x="300.0" y="553.68" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" font-style="normal" text-anchor="middle" fill="#0f172a">candidates: (dist_name, type, cls)  — grouped by type</text><line x1="300.0" y1="476" x2="300.0" y2="522" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><text x="314.0" y="498" font-family="Helvetica, Arial, sans-serif" font-size="9.5" font-weight="normal" font-style="normal" text-anchor="start" fill="#047857">valid</text><text x="70.0" y="618" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#92400e">_pick_winner(type, group, override)  — applied once per connector type with &gt;1 candidate:</text><rect x="70.0" y="628" width="280" height="124" rx="10" ry="10" fill="#fffbeb" stroke="#92400e" stroke-width="1.5"/><text x="82.0" y="652" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">1. explicit override</text><line x1="82.0" y1="659" x2="338.0" y2="659" stroke="#cbd5e1" stroke-width="1"/><text x="82.0" y="676" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="82.0" dy="0">config forces type → plugin_id.</tspan><tspan x="82.0" dy="15.5">Wins outright. Unknown plugin_id</tspan><tspan x="82.0" dy="15.5">→ fails loudly (misconfiguration),</tspan><tspan x="82.0" dy="15.5">never silently falls through.</tspan></text><rect x="374.0" y="628" width="280" height="124" rx="10" ry="10" fill="#fffbeb" stroke="#92400e" stroke-width="1.5"/><text x="386.0" y="652" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">2. built-in shadow protection</text><line x1="386.0" y1="659" x2="642.0" y2="659" stroke="#cbd5e1" stroke-width="1"/><text x="386.0" y="676" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="386.0" dy="0">a built-in connector always wins</tspan><tspan x="386.0" dy="15.5">over a third party for the same</tspan><tspan x="386.0" dy="15.5">type — UNLESS the config sets</tspan><tspan x="386.0" dy="15.5">&quot;&lt;type&gt;:allow_override&quot; = &quot;true&quot;.</tspan></text><rect x="678.0" y="628" width="280" height="124" rx="10" ry="10" fill="#fffbeb" stroke="#92400e" stroke-width="1.5"/><text x="690.0" y="652" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">3. deterministic sort</text><line x1="690.0" y1="659" x2="946.0" y2="659" stroke="#cbd5e1" stroke-width="1"/><text x="690.0" y="676" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="690.0" dy="0">among remaining third parties:</tspan><tspan x="690.0" dy="15.5">sorted by (dist_name, plugin_id),</tspan><tspan x="690.0" dy="15.5">first wins. Same inputs → same</tspan><tspan x="690.0" dy="15.5">winner, every time.</tspan></text><line x1="300.0" y1="578" x2="300.0" y2="628" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><line x1="350.0" y1="648" x2="374.0" y2="648" stroke="#92400e" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#arrow-92400e)"/><text x="362.0" y="642" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="normal" font-style="normal" text-anchor="middle" fill="#92400e">else</text><line x1="654.0" y1="648" x2="678.0" y2="648" stroke="#92400e" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#arrow-92400e)"/><text x="666.0" y="642" font-family="Helvetica, Arial, sans-serif" font-size="9" font-weight="normal" font-style="normal" text-anchor="middle" fill="#92400e">else</text><rect x="70.0" y="802" width="624.0" height="76" rx="10" ry="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/><text x="82.0" y="827" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">ConnectorRegistry  — final resolved state</text><line x1="82.0" y1="834" x2="682.0" y2="834" stroke="#cbd5e1" stroke-width="1"/><text x="82.0" y="851" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="82.0" dy="0">_by_type / _by_plugin_id (the winners)</tspan><tspan x="82.0" dy="15.5">LoadReport { loaded, failures, shadowed }</tspan></text><line x1="210.0" y1="752" x2="210.0" y2="802" stroke="#92400e" stroke-width="1.6" marker-end="url(#arrow-92400e)"/><line x1="514.0" y1="752" x2="382.0" y2="802" stroke="#92400e" stroke-width="1.6" marker-end="url(#arrow-92400e)"/><line x1="818.0" y1="752" x2="818.0" y2="802" stroke="#92400e" stroke-width="1.6" marker-end="url(#arrow-92400e)"/><rect x="718.0" y="802" width="240" height="76" rx="10" ry="10" fill="#fff" stroke="#1d4ed8" stroke-width="1.5"/><text x="730.0" y="825.5" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">registry.get(type_or_plugin_id)</text><line x1="730.0" y1="832.5" x2="946.0" y2="832.5" stroke="#cbd5e1" stroke-width="1"/><text x="730.0" y="849.5" font-family="Helvetica, Arial, sans-serif" font-size="9.8" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="730.0" dy="0">BackupService resolves a source&#x27;s</tspan><tspan x="730.0" dy="15.5">connector here at run time.</tspan></text><line x1="694.0" y1="840.0" x2="718.0" y2="840.0" stroke="#1d4ed8" stroke-width="1.6" marker-end="url(#arrow-1d4ed8)"/><rect x="590.0" y="522" width="220" height="110" rx="10" ry="10" fill="#fff" stroke="#b91c1c" stroke-width="1.5"/><text x="602.0" y="544.8" font-family="Helvetica, Arial, sans-serif" font-size="10.8" font-weight="700" font-style="normal" text-anchor="start" fill="#0f172a">dbs connectors list --verbose</text><line x1="602.0" y1="551.8" x2="798.0" y2="551.8" stroke="#cbd5e1" stroke-width="1"/><text x="602.0" y="568.8" font-family="Helvetica, Arial, sans-serif" font-size="9.3" font-weight="normal" text-anchor="start" fill="#334155"><tspan x="602.0" dy="0">surfaces every LoadFailure</tspan><tspan x="602.0" dy="15.5">(entry point, dist, reason) so a</tspan><tspan x="602.0" dy="15.5">bad third-party plugin is visible</tspan><tspan x="602.0" dy="15.5">without crashing the tool.</tspan></text><line x1="700.0" y1="476" x2="700.0" y2="522" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arrow-b91c1c)"/></svg>