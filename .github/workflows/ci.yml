name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,yaml]"
      - name: Run tests (with coverage gate)
        run: pytest -q --cov=dbs --cov-report=term --cov-fail-under=80
      - name: Smoke-test the CLI
        run: |
          cd "$(mktemp -d)"
          dbs version
          dbs init
          dbs connectors list
          dbs export --out out.ndjson --format ndjson

  # The heavy connector import paths (yt-dlp, playwright) only ship green if
  # something actually installs them — the plain job's [dev,yaml] never does.
  # The [research] extra is deliberately excluded: notebooklm-py[browser] is
  # an unpinned community package and would make CI flaky.
  test-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with connector extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,yaml,web,reddit,youtube,skool]"
      - name: Run tests
        run: pytest -q
