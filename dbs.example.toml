# Daily Backup System configuration (TOML).
# Secrets are NEVER stored here. Put them in .env and reference them with *_env keys.

[dbs]
database = "dbs.sqlite3"          # SQLite file (created automatically)
export_dir = "exports"           # default output directory for exports
download_root = "downloads"      # each source downloads into <download_root>/<source-name>
default_overlap_seconds = 300    # re-scan window to avoid boundary gaps
# parallel = 1                   # back up N sources at once with --all (CLI
#                                # --parallel overrides; browser-heavy
#                                # connectors never overlap each other)

# --- Sources --------------------------------------------------------------
# Each [sources.NAME] block configures one backup source. The 'type' selects a
# connector; the remaining keys are validated against that connector's schema
# (see: dbs connectors describe <type>).

[sources.raindrop]
type = "raindrop"
enabled = true
schedule = "daily"               # advisory; honored by `backup --only-due`
reconcile_every_runs = 7         # every Nth run does a full reconcile (edits + deletions)
collection_id = 0                # 0 = all collections except Trash
nested = true
page_size = 50                   # Raindrop max is 50
poll_trash = true                # detect deletions quickly via the Trash collection
token_env = "RAINDROP_TOKEN"     # name of the env var holding your API token

# Reddit saved posts/comments (browser session, no API token).
# Needs the extra:  pip install 'daily-backup-system[reddit]' && playwright install chromium
# REDDIT_SESSION_DIR must point at a logged-in Playwright session directory.
# [sources.reddit]
# type = "reddit"
# enabled = true
# username = "your-reddit-username"  # optional; auto-detected from the session, warns on mismatch
# headless = true  # if runs fail with HTTP 403 even after re-capturing, set false
# session_dir_env = "REDDIT_SESSION_DIR"

# YouTube lists: Watch Later, Liked, (history), and your playlists (yt-dlp).
# Needs the extra:  pip install 'daily-backup-system[youtube]'
# Auth: a cookies.txt via YOUTUBE_COOKIES_FILE, OR set cookies_from_browser.
# [sources.youtube]
# type = "youtube"
# enabled = true
# watch_later = true
# liked = true
# history = false                # huge and timestamp-less via this route; opt-in
# playlists = true
# cookies_file_env = "YOUTUBE_COOKIES_FILE"
# # cookies_from_browser = "chrome"

# Skool: back up your communities/courses/lessons directly via a logged-in
# browser session (no external tool). Needs the extra:
#   pip install 'daily-backup-system[skool]' && playwright install chromium && ffdl install -y
# Click "Skool login" in the web UI to capture the session (SKOOL_SESSION_DIR);
# a browser opens, you log in, and CLOSE the window to finish. The catalog is
# indexed into the DB and each lesson's attached resource files are downloaded
# under <download_root>/<source-name>, or downloads_dir if set (recorded as
# references; set store_media to pull the bytes
# into the DB). Native (Mux) AND external (Vimeo/YouTube/Loom) lesson videos
# are both downloaded (download_videos, on by default; yt-dlp + auto-managed
# ffmpeg via ffmpeg-downloader). A markdown note per lesson and a zip of any
# GitHub repos linked from a lesson are also written by default.
# [sources.skool]
# type = "skool"
# enabled = true
# downloads_dir = "~/skool-backup"        # optional override; default <download_root>/<source-name>
# download_videos = true                   # set false for catalog/resources only
# video_quality = 1080                     # cap the HLS variant height; 0 = best
# communities = ["your-community"]         # optional; OMIT to auto-detect every community you've joined
# no_download_communities = ["lapsed-one"]  # catalog-only communities: no lesson pages / videos / resources.
#                                          # For memberships you no longer pay for — their media is access-
#                                          # gated, so every attempt would fail. Files downloaded while
#                                          # access lasted are kept.
# include_kinds = ["community", "course", "lesson"]
# headless = true                          # set false if Skool blocks the automated browser
# session_dir_env = "SKOOL_SESSION_DIR"
# write_markdown = true                    # an Obsidian/url2obs-style note per lesson
# download_github_repos = true             # zip any GitHub repo linked from a lesson note
# store_media = true                       # pull downloaded resource files INTO the DB
# max_media_mb = 200                       # per-file cap (0 = no limit); larger files stay referenced

# Podcasts via RSS/Atom feeds (no account or token). Feeds come from `feeds`
# and/or an OPML export from your podcast app; episode metadata is always
# stored, audio only when download_audio = true (written under
# <download_root>/<source-name>, referenced — never inlined into the DB).
# Episodes leaving a feed's rolling window are NOT treated as deletions.
# [sources.podcasts]
# type = "podcast"
# enabled = true
# feeds = ["https://example.com/feed.xml"]
# opml_path = "~/podcasts.opml"          # merged with `feeds`, deduplicated
# download_audio = false
# max_episodes_per_feed = 0              # 0 = no cap

# Pocket Casts account: subscriptions, starred episodes, listening history.
# Uses the unofficial web-player API (may change without notice). History
# entries that scroll off the server-side window get soft-deleted on later
# runs (rows/revisions kept; see the connector docstring).
# Secrets: POCKETCASTS_EMAIL, POCKETCASTS_PASSWORD in .env.
# [sources.pocketcasts]
# type = "pocketcasts"
# enabled = true
# include_subscriptions = true
# include_starred = true
# include_history = true

# Udemy: enrolled courses + full curriculum (article lectures included).
# Auth: UDEMY_ACCESS_TOKEN = the `access_token` cookie from a logged-in
# browser. download_videos additionally needs UDEMY_COOKIES_FILE (a Netscape
# cookies.txt export) and the [youtube] extra (yt-dlp); DRM-protected
# lectures are skipped with a warning.
# [sources.udemy]
# type = "udemy"
# enabled = true
# course_filter = []                     # ids or slugs; empty = everything
# download_videos = false
# video_format = "best"

# --- Optional: connector collision overrides ------------------------------
# [connectors.raindrop]
# plugin = "daily-backup-system:raindrop"
# allow_override = false
